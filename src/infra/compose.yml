name: atacahub-api
services:
  pg:
    image: "postgres:18"
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  pgweb:
    image: sosedoff/pgweb
    restart: "always"
    ports:
      - "5433:8081"
    env_file:
      - ../../.env
    depends_on:
      - pg

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
